[workspace]
channels = ["conda-forge"]
name = "backend"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
librosa = ">=0.11.0,<0.12"
numpy = ">=2.4.2,<3"
scipy = ">=1.17.1,<2"

[pypi-dependencies]
fastapi = ">=0.135.1, <0.136"
uvicorn = { version = ">=0.41.0, <0.42", extras = ["standard"] }
